<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <head>
        <h1>Academia Sobella</h1>
    </head>
    <Section>
        <form action="">
                <div >
                    <label for="">Nome completo</label>
                    <input name="nome" type="text">
                </div>
                <div>   
                    <label for="">Email</label>
                    <input type="text" name="email" id="">
                </div>
                <div>   
                    <label for="">Número de telefone</label>
                    <input type="text" name="telefone" id="">
                </div>
                <div>   
                    <label for="">Cadastro de Pessoas Físicas (CPF)</label>
                    <input type="text" name="CPF" id="">
                </div>
                <div>
                    <label for="">Forma de pagamento</label>
                    <select name="pagamento" id="">
                        <option value="DEBITO">Debito</option>
                        <option value="CREDITO">Credito</option>
                        <option value="PIX">Chave Pix</option>
                        <option value="BOLETO">Boleto</option>
                        <option value="DINHEIRO">Dinheiro</option>
                    </select>
                </div>

            </div>
            <div class="div_button">
                <a href="./confirmarCadastro.html">  <img src="./img/icons8-cadastro-40.png" alt=""></a>
            </div>
        </form>
    </Section>

    <script src="./js/script.js"></script>
</body>
</html>
